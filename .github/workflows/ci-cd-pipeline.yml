name: EduProcess CI/CD Multi-Environment Pipeline

on:
  push:
    branches: [ develop, qa, main ]
  pull_request:
    branches: [ develop, qa, main ]

jobs:
  verify-frontend:
    name: Frontend Verification (Node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Check Frontend Changes
        id: filter-frontend
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend_files:
              - 'frontend/**'
              - '.github/workflows/qa-pipeline.yml'

      - name: Setup Node.js v24 Environment
        if: steps.filter-frontend.outputs.frontend_files == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Execute Install Checks (Dependencies)
        if: steps.filter-frontend.outputs.frontend_files == 'true'
        run: npm ci

      - name: Execute Build Verification (Compilation)
        if: steps.filter-frontend.outputs.frontend_files == 'true'
        run: npm run build

  verify-backend:
    name: Backend Verification (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Check Backend Changes
        id: filter-backend
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_files:
              - 'backend/**'
              - '.github/workflows/qa-pipeline.yml'

      - name: Setup Node.js v22 LTS Environment
        if: steps.filter-backend.outputs.backend_files == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Execute Install Checks (Dependencies)
        if: steps.filter-backend.outputs.backend_files == 'true'
        run: npm ci

      - name: Execute Prisma Client Generation
        if: steps.filter-backend.outputs.backend_files == 'true'
        run: npx prisma generate

      - name: Execute Build Verification (Compilation)
        if: steps.filter-backend.outputs.backend_files == 'true'
        run: npm run build

      - name: Execute All Test Suites (Auth & Procedures)
        if: steps.filter-backend.outputs.backend_files == 'true'
        run: npm test

  publish-images:
    name: Build & Publish Images to Docker Hub
    runs-on: ubuntu-latest
    needs: [verify-frontend, verify-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Detect Changes for Docker
        id: docker-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Target Image Tag
        id: get-tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_tag=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/qa" ]; then
            echo "env_tag=qa" >> $GITHUB_OUTPUT
          else
            echo "env_tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend Image
        if: steps.docker-filter.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduprocess-backend:${{ steps.get-tag.outputs.env_tag }}

      - name: Build and Push Frontend Image
        if: steps.docker-filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduprocess-frontend:${{ steps.get-tag.outputs.env_tag }}

  deploy-qa:
    name: Deploy to AWS EC2 QA Environment
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/qa'
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Copy Infrastructure Files to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.QA_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.QA_SSH_KEY }}
          source: "infrastructure/docker-compose.qa.yml,infrastructure/nginx.qa.conf,infrastructure/prometheus.yml,infrastructure/alert.rules.yml,infrastructure/grafana-datasources.qa.yml,infrastructure/grafana-dashboards.yml,infrastructure/dashboards/eduprocess_metrics.json"
          target: "~/eduprocess-qa"
          strip_components: 1

      - name: Execute Remote SSH Commands for Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ~/eduprocess-qa
            mv docker-compose.qa.yml docker-compose.yml 2>/dev/null || true
            mv nginx.qa.conf nginx.conf 2>/dev/null || true
            mv grafana-datasources.qa.yml grafana-datasources.qa.yml 2>/dev/null || true
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            docker compose pull
            docker compose up -d --remove-orphans --force-recreate
            docker image prune -f

  deploy-prod:
    name: Deploy to AWS EC2 Production Environment
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Copy Infrastructure Files to Production via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "infrastructure/docker-compose.prod.yml,infrastructure/nginx.prod.conf,infrastructure/prometheus.yml,infrastructure/alert.rules.yml,infrastructure/grafana-datasources.prod.yml,infrastructure/grafana-dashboards.yml,infrastructure/dashboards/eduprocess_metrics.json"
          target: "~/eduprocess-prod"
          strip_components: 1

      - name: Execute Remote SSH Commands for Production Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/eduprocess-prod
            mv docker-compose.prod.yml docker-compose.yml 2>/dev/null || true
            mv nginx.prod.conf nginx.conf 2>/dev/null || true
            mv grafana-datasources.prod.yml grafana-datasources.prod.yml 2>/dev/null || true
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            docker compose pull
            docker compose up -d --remove-orphans --force-recreate
            docker image prune -f
  
  orchestrate-release:
    name: Automated Release Governance & Archival
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Release Orchestration Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x ./infrastructure/scripts/orchestrate-release.sh
          ./infrastructure/scripts/orchestrate-release.sh