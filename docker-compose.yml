version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: eduprocess_postgres_sandbox
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-eduprocess_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - edu_postgres_data:/var/lib/postgresql/data
    networks:
      - eduprocess_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: eduprocess_backend_sandbox
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu_user}:${POSTGRES_PASSWORD:-edu_secure_pass}@postgres_db:5432/${POSTGRES_DB:-eduprocess_local}?schema=public
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - eduprocess_network
    depends_on:
      - postgres_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eduprocess_frontend_sandbox
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - eduprocess_network
    depends_on:
      - backend
    tty: true

networks:
  eduprocess_network:
    driver: bridge

volumes:
  edu_postgres_data:
    driver: local