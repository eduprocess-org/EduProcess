global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"
  
scrape_configs:
  - job_name: 'prometheus'
    metrics_path: '/prometheus/metrics'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'eduprocess-backend-qa'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'docker-containers-qa'
    static_configs:
      - targets: ['cadvisor:8080']