services:
  backend:
    image: xfrixonl/eduprocess-backend:qa
    container_name: eduprocess-backend-qa
    restart: always
    env_file:
      - .env
    networks:
      - eduprocess-qa-network

  frontend:
    image: xfrixonl/eduprocess-frontend:qa
    container_name: eduprocess-frontend-qa
    restart: always
    env_file:
      - .env
    networks:
      - eduprocess-qa-network

  nginx:
    image: nginx:1.25.5-alpine
    container_name: eduprocess-nginx-qa
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - eduprocess-qa-network
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:v2.51.1
    container_name: eduprocess-prometheus-qa
    restart: always
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=/prometheus/'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - eduprocess-qa-network
    depends_on:
      - backend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: eduprocess-cadvisor-qa
    restart: always
    user: root          
    privileged: true    
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro 
    devices:
      - /dev/kmsg
    command:
      - '--docker_only=true'
    networks:
      - eduprocess-qa-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: eduprocess-grafana-qa
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true                           
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.qa.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro 
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards/eduprocess_metrics.json:/var/lib/grafana/dashboards/eduprocess_metrics.json:ro
    networks:
      - eduprocess-qa-network
    depends_on:
      - prometheus

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  eduprocess-qa-network:
    driver: bridge